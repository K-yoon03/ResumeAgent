server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router 지원 (새로고침 시 404 방지)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE 스트리밍 지원
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
