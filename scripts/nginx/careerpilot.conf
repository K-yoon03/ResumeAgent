# /etc/nginx/sites-available/careerpilot
# Nginx Reverse Proxy & Load Balancer 설정

upstream backend {
    least_conn;  # 연결 수 기반 로드 밸런싱
    
    # Tier 2 App 인스턴스들 (Private IP로 수정 필요!)
    server 10.0.2.10:8080 max_fails=3 fail_timeout=30s;
    server 10.0.2.11:8080 max_fails=3 fail_timeout=30s;
    server 10.0.2.12:8080 max_fails=3 fail_timeout=30s;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name careerpilot.com www.careerpilot.com;
    
    # Let's Encrypt 인증서 발급용
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl http2;
    server_name careerpilot.com www.careerpilot.com;
    
    # SSL 인증서 (Let's Encrypt)
    # certbot으로 자동 생성됨
    ssl_certificate /etc/letsencrypt/live/careerpilot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careerpilot.com/privkey.pem;
    
    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 로그 설정
    access_log /var/log/nginx/careerpilot.access.log;
    error_log /var/log/nginx/careerpilot.error.log;
    
    # 클라이언트 최대 업로드 크기
    client_max_body_size 10M;
    
    # 정적 파일 (프론트엔드) - 백엔드에서 제공
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # API 요청
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # 프록시 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout 설정 (API는 좀 더 길게)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # 버퍼링 비활성화 (실시간 스트리밍용)
        proxy_buffering off;
    }
    
    # Health Check (Nginx 자체)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Actuator Health Check (백엔드)
    location /actuator/health {
        proxy_pass http://backend;
        access_log off;
    }
}
